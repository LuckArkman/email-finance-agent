apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-agent-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.luckarkman-finance.com
    secretName: finance-agent-tls
  rules:
  - host: api.luckarkman-finance.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finance-agent-api-service
            port:
              number: 80
