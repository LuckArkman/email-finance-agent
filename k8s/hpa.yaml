apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finance-agent-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finance-agent-worker
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
# Advanced: Scaling based on Redis/Celery queue length using KEDA
# Requires KEDA installed in the cluster (https://keda.sh/)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: finance-agent-worker-scaledobject
spec:
  scaleTargetRef:
    name: finance-agent-worker
  minReplicaCount: 1
  maxReplicaCount: 20
  triggers:
  - type: redis
    metadata:
      address: redis-service:6379
      listName: ocr_queue
      listLength: "5" # Scale up if more than 5 items in queue
      databaseIndex: "0"
