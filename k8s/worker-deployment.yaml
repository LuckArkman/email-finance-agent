apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-agent-worker
  labels:
    app: finance-agent
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance-agent
      component: worker
  template:
    metadata:
      labels:
        app: finance-agent
        component: worker
    spec:
      containers:
      - name: worker
        image: luckarkman/email-finance-agent-backend:latest
        imagePullPolicy: Always
        command: ["celery", "-A", "app.tasks.ocr_tasks.celery_app", "worker", "--loglevel=info", "-Q", "ocr_queue,default"]
        envFrom:
        - secretRef:
            name: finance-agent-secrets
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
