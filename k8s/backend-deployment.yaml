apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-agent-api
  labels:
    app: finance-agent
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-agent
      component: api
  template:
    metadata:
      labels:
        app: finance-agent
        component: api
    spec:
      containers:
      - name: api
        image: luckarkman/email-finance-agent-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: finance-agent-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
