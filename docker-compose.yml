version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: efa_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=finance_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: efa_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: efa_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: efa_backend
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=AI Email Finance Agent
      - ENVIRONMENT=production
      - DEBUG=False
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/finance_agent
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
    command: ["/app/start.sh"]
    restart: unless-stopped
    depends_on:
      - postgres
      - mongodb
      - redis

  celery_worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: efa_celery_worker
    environment:
      - PROJECT_NAME=AI Email Finance Agent
      - ENVIRONMENT=production
      - DEBUG=False
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/finance_agent
      - MONGO_URL=mongodb://mongodb:27017
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
    command: ["/app/src/start-celery.sh"]
    depends_on:
      - redis
      - mongodb
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: efa_frontend
    ports:
      - "80:80"
    # depends_on:
    #   - backend
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
